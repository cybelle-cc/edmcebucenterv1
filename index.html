<!-- Firebase -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCNRUruPe1hAgGK1eJAGsGTnwIEcI7Oirs",
      authDomain: "edm-transac.firebaseapp.com",
      projectId: "edm-transac",
      storageBucket: "edm-transac.firebasestorage.app",
      messagingSenderId: "722463634080",
      appId: "1:722463634080:web:15f9f12fea55e2283f0fc5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

  //LOGIN
  window.login = async function () {
  const username = document.getElementById("user").value.trim();
  const password = document.getElementById("password").value.trim();
  const role = document.getElementById("role").value;
  const error = document.getElementById("error");

  error.textContent = "";

  if (!username || !password || !role) {
    error.textContent = "All fields are required.";
    return;
  }

  try {
    // 🔍 Get Firestore document (School ID = document ID)
    const userRef = doc(db, "users", username);
    const snap = await getDoc(userRef);

    if (!snap.exists()) {
      error.textContent = "User not found.";
      return;
    }

    const userData = snap.data();

    if (userData.password !== password) {
      error.textContent = "Incorrect password.";
      return;
    }

    if (userData.role !== role) {
      error.textContent = "Role mismatch.";
      return;
    }

    sessionStorage.setItem("userData", JSON.stringify({
      id: username,
      name: userData.name,
      role: userData.role,
      university: userData.university || ""
    }));

    if (role === "SCHOLAR") window.location.href = "scholar.html";
    if (role === "Center SDO") window.location.href = "approver.html";
    if (role === "House Parent") window.location.href = "releasing.html";

  } catch (err) {
    console.error(err);
    error.textContent = "Login failed.";
  }
};

// UI helpers
window.showForgot = () => {
  document.getElementById("login-container").style.display = "none";
  document.getElementById("forgot-container").style.display = "block";
};

window.showLogin = () => {
  document.getElementById("login-container").style.display = "block";
  document.getElementById("forgot-container").style.display = "none";
};

window.resetPassword = async function () {
  const username = document.getElementById("forgot-username").value.trim();
  const newPassword = document.getElementById("new-password").value.trim();
  const repeatPassword = document.getElementById("repeat-password").value.trim();
  const msg = document.getElementById("reset-message");

  // Clear previous message
  msg.textContent = "";
  msg.className = "text-center small mt-1 mb-2";

  if (!username || !newPassword || !repeatPassword) {
    msg.textContent = "All fields are required.";
    msg.classList.add("text-danger");
    return;
  }

  if (newPassword !== repeatPassword) {
    msg.textContent = "Passwords do not match.";
    msg.classList.add("text-danger");
    return;
  }

  if (newPassword.length < 6) {
    msg.textContent = "Password must be at least 6 characters.";
    msg.classList.add("text-danger");
    return;
  }

  try {
    const userRef = doc(db, "users", username);
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists()) {
      msg.textContent = "Username not found.";
      msg.classList.add("text-danger");
      return;
    }

    await updateDoc(userRef, { password: newPassword });

    msg.textContent = "✓ Password changed successfully!";
    msg.classList.add("text-success", "fw-bold");

    document.getElementById("forgot-username").value = "";
    document.getElementById("new-password").value = "";
    document.getElementById("repeat-password").value = "";

  } catch (err) {
    console.error(err);
    msg.textContent = "Failed to reset password. Try again.";
    msg.classList.add("text-danger");
  }
};

  // Forgot password (uses Firebase Auth email system if email exists in your DB)

    errorEl.textContent = '';

    if (!username) {
      errorEl.textContent = "Enter your username!";
      return;
    }

      // Get user email from Firestore

      const userSnap = await getDoc(userRef);

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function () {
    if (localStorage.getItem("darkMode") === "true") {
      document.body.classList.add("dark-mode");
    }
  })();

  window.toggleDarkMode = function () {
    const isDark = document.body.classList.toggle("dark-mode");
    localStorage.setItem("darkMode", isDark);
    updateDarkModeUI(isDark);
  };

  function updateDarkModeUI(isDark) {
  const icon = document.getElementById("dark-mode-icon");
  const label = document.getElementById("dark-mode-label");
  if (icon) icon.className = isDark ? "bi bi-sun-fill" : "bi bi-moon-stars-fill";
  if (label) label.textContent = isDark ? "Light Mode" : "Dark Mode";

  // Manually swap logos
  document.querySelectorAll(".logo-default").forEach(el => {
    el.style.display = isDark ? "none" : "inline-block";
  });
  document.querySelectorAll(".logo-dark").forEach(el => {
    el.style.display = isDark ? "inline-block" : "none";
  });
}

  document.addEventListener("DOMContentLoaded", () => {
    const isDark = localStorage.getItem("darkMode") === "true";
    updateDarkModeUI(isDark);
  });

  
</script>
